name: Nightly

on:
  schedule:
    - cron: '17 18 * * *'
  workflow_dispatch:

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: dart pub get
      - run: dart test
        working-directory: packages/zc_agentbeacon_core
      - name: Build snapshot
        run: |
          set -eux
          mkdir -p dist/snapshot
          (cd apps/dashboard && flutter build web --release)
          dart compile exe apps/companion/bin/zc_agentbeacon_companion.dart -o dist/snapshot/zc-agentbeacon-companion
          dart compile exe apps/server/bin/zc_agentbeacon_server.dart -o dist/snapshot/zc-agentbeacon-server
          cp -R apps/dashboard/build/web dist/snapshot/dashboard
          tar -czf ZcAgentBeacon-nightly-linux-x64.tar.gz -C dist/snapshot .
      - uses: actions/upload-artifact@v4
        with:
          name: ZcAgentBeacon-nightly-linux-x64
          path: ZcAgentBeacon-nightly-linux-x64.tar.gz
