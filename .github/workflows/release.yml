name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag, for example v0.1.0'
        required: true
        type: string
      title:
        description: 'Release title. Leave empty to use the tag.'
        required: false
        type: string

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: dart pub get
      - run: New-Item -ItemType Directory -Force -Path dist/companion-windows | Out-Null
        shell: pwsh
      - name: Build Companion
        shell: pwsh
        run: |
          dart compile exe apps/companion/bin/zc_agentbeacon_companion.dart -o dist/companion-windows/zc-agentbeacon-companion.exe
          Copy-Item installers/windows/* dist/companion-windows/
          Compress-Archive -Path dist/companion-windows/* -DestinationPath dist/ZcAgentBeaconCompanion-windows-x64.zip
      - uses: actions/upload-artifact@v4
        with:
          name: companion-windows
          path: dist/ZcAgentBeaconCompanion-windows-x64.zip

  macos:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: dart pub get
      - name: Build Companion
        run: |
          mkdir -p dist/companion-macos
          dart compile exe apps/companion/bin/zc_agentbeacon_companion.dart -o dist/companion-macos/zc-agentbeacon-companion
          cp installers/macos/* dist/companion-macos/
          chmod +x dist/companion-macos/*
          tar -czf dist/ZcAgentBeaconCompanion-macos-x64.tar.gz -C dist/companion-macos .
      - uses: actions/upload-artifact@v4
        with:
          name: companion-macos
          path: dist/ZcAgentBeaconCompanion-macos-x64.tar.gz

  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: dart pub get
      - name: Build Linux packages
        env:
          RELEASE_INPUT_TAG: ${{ inputs.tag }}
        run: |
          set -eux
          mkdir -p dist/companion-linux dist/hub-linux/dashboard
          (cd apps/dashboard && flutter build web --release)
          dart compile exe apps/companion/bin/zc_agentbeacon_companion.dart -o dist/companion-linux/zc-agentbeacon-companion
          dart compile exe apps/server/bin/zc_agentbeacon_hub.dart -o dist/hub-linux/zc-agentbeacon-hub
          cp installers/linux/install-companion.sh installers/linux/uninstall-companion.sh dist/companion-linux/
          cp installers/linux/install-hub.sh installers/linux/uninstall-hub.sh dist/hub-linux/
          cp -R apps/dashboard/build/web/. dist/hub-linux/dashboard/
          chmod +x dist/companion-linux/* dist/hub-linux/zc-agentbeacon-hub dist/hub-linux/install-hub.sh dist/hub-linux/uninstall-hub.sh
          tar -czf dist/ZcAgentBeaconCompanion-linux-x64.tar.gz -C dist/companion-linux .
          tar -czf dist/ZcAgentBeaconHub-linux-x64.tar.gz -C dist/hub-linux .

          mkdir -p deb/DEBIAN deb/usr/bin deb/usr/share/zc-agentbeacon/dashboard deb/usr/lib/systemd/system
          cp dist/hub-linux/zc-agentbeacon-hub deb/usr/bin/
          cp -R apps/dashboard/build/web/. deb/usr/share/zc-agentbeacon/dashboard/
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            PACKAGE_VERSION="${RELEASE_INPUT_TAG}"
            PACKAGE_VERSION="${PACKAGE_VERSION#v}"
          elif [ "${GITHUB_REF_TYPE:-}" = "tag" ]; then
            PACKAGE_VERSION="${GITHUB_REF_NAME#v}"
          else
            PACKAGE_VERSION="0.0.0+${GITHUB_RUN_NUMBER:-0}"
          fi
          if ! echo "$PACKAGE_VERSION" | grep -Eq '^[0-9]'; then
            PACKAGE_VERSION="0.0.0+${GITHUB_RUN_NUMBER:-0}"
          fi
          cat > deb/DEBIAN/control <<EOF
          Package: zc-agentbeacon-hub
          Version: ${PACKAGE_VERSION}
          Section: utils
          Priority: optional
          Architecture: amd64
          Maintainer: ZcAgentBeacon
          Description: LAN hub and dashboard for Codex conversation status
          EOF
          cat > deb/usr/lib/systemd/system/zc-agentbeacon.service <<EOF
          [Unit]
          Description=ZcAgentBeacon Hub
          After=network-online.target
          Wants=network-online.target

          [Service]
          Environment=ZC_AGENTBEACON_HUB_PORT=42178
          Environment=ZC_AGENTBEACON_WEB_ROOT=/usr/share/zc-agentbeacon/dashboard
          ExecStart=/usr/bin/zc-agentbeacon-hub --host 0.0.0.0 --port 42178 --web-root /usr/share/zc-agentbeacon/dashboard
          Restart=always
          RestartSec=3

          [Install]
          WantedBy=multi-user.target
          EOF
          dpkg-deb --build deb dist/ZcAgentBeaconHub-linux-x64.deb
      - uses: actions/upload-artifact@v4
        with:
          name: companion-linux
          path: dist/ZcAgentBeaconCompanion-linux-x64.tar.gz
      - uses: actions/upload-artifact@v4
        with:
          name: hub-linux
          path: |
            dist/ZcAgentBeaconHub-linux-x64.tar.gz
            dist/ZcAgentBeaconHub-linux-x64.deb

  raspberry-pi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: dart pub get
      - name: Build source fallback package
        run: |
          set -eux
          mkdir -p dist/pi-source/dashboard
          (cd apps/dashboard && flutter build web --release)
          cp -R apps packages installers/raspberry-pi scripts pubspec.yaml analysis_options.yaml dist/pi-source/
          cp -R apps/dashboard/build/web/. dist/pi-source/dashboard/
          tar -czf dist/ZcAgentBeaconHub-raspberry-pi-source.tar.gz -C dist/pi-source .
      - uses: actions/upload-artifact@v4
        with:
          name: hub-raspberry-pi
          path: dist/ZcAgentBeaconHub-raspberry-pi-source.tar.gz

  publish:
    needs: [windows, macos, linux, raspberry-pi]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true
      - name: Checksums
        run: |
          cd release
          sha256sum * > SHA256SUMS
      - name: Release metadata
        id: meta
        env:
          RELEASE_INPUT_TAG: ${{ inputs.tag }}
          RELEASE_INPUT_TITLE: ${{ inputs.title }}
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            tag="${RELEASE_INPUT_TAG}"
            title="${RELEASE_INPUT_TITLE}"
          else
            tag="${GITHUB_REF_NAME}"
            title="${GITHUB_REF_NAME}"
          fi
          if [ -z "$title" ]; then
            title="$tag"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "title=$title" >> "$GITHUB_OUTPUT"
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.title }}
          target_commitish: ${{ github.sha }}
          files: release/*
          generate_release_notes: true
