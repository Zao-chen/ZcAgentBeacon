name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag, for example v0.1.0'
        required: true
        type: string
      title:
        description: 'Release title. Leave empty to use the tag.'
        required: false
        type: string

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: dart pub get
      - run: New-Item -ItemType Directory -Force -Path dist/windows | Out-Null
        shell: pwsh
      - name: Build CLIs
        shell: pwsh
        run: |
          dart compile exe apps/companion/bin/zc_agentbeacon_companion.dart -o dist/windows/zc-agentbeacon-companion.exe
          dart compile exe apps/server/bin/zc_agentbeacon_server.dart -o dist/windows/zc-agentbeacon-server.exe
          Copy-Item installers/windows/* dist/windows/
          Compress-Archive -Path dist/windows/* -DestinationPath dist/ZcAgentBeacon-windows-x64.zip
      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: dist/ZcAgentBeacon-windows-x64.zip

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: dart pub get
      - name: Build CLIs
        run: |
          mkdir -p dist/macos
          dart compile exe apps/companion/bin/zc_agentbeacon_companion.dart -o dist/macos/zc-agentbeacon-companion
          dart compile exe apps/server/bin/zc_agentbeacon_server.dart -o dist/macos/zc-agentbeacon-server
          cp installers/macos/* dist/macos/
          chmod +x dist/macos/*
          tar -czf dist/ZcAgentBeacon-macos-universal.tar.gz -C dist/macos .
      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: dist/ZcAgentBeacon-macos-universal.tar.gz

  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: dart pub get
      - name: Build Linux packages
        env:
          RELEASE_INPUT_TAG: ${{ inputs.tag }}
        run: |
          set -eux
          mkdir -p dist/linux
          (cd apps/dashboard && flutter build web --release)
          dart compile exe apps/companion/bin/zc_agentbeacon_companion.dart -o dist/linux/zc-agentbeacon-companion
          dart compile exe apps/server/bin/zc_agentbeacon_server.dart -o dist/linux/zc-agentbeacon-server
          cp installers/linux/* dist/linux/
          chmod +x dist/linux/*
          tar -czf dist/ZcAgentBeacon-linux-x64.tar.gz -C dist/linux .

          mkdir -p deb/DEBIAN deb/usr/bin deb/usr/share/zc-agentbeacon/dashboard
          cp dist/linux/zc-agentbeacon-companion deb/usr/bin/
          cp dist/linux/zc-agentbeacon-server deb/usr/bin/
          cp -R apps/dashboard/build/web/. deb/usr/share/zc-agentbeacon/dashboard/
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            PACKAGE_VERSION="${RELEASE_INPUT_TAG}"
            PACKAGE_VERSION="${PACKAGE_VERSION#v}"
          elif [ "${GITHUB_REF_TYPE:-}" = "tag" ]; then
            PACKAGE_VERSION="${GITHUB_REF_NAME#v}"
          else
            PACKAGE_VERSION="0.0.0+${GITHUB_RUN_NUMBER:-0}"
          fi
          if ! echo "$PACKAGE_VERSION" | grep -Eq '^[0-9]'; then
            PACKAGE_VERSION="0.0.0+${GITHUB_RUN_NUMBER:-0}"
          fi
          cat > deb/DEBIAN/control <<EOF
          Package: zc-agentbeacon
          Version: ${PACKAGE_VERSION}
          Section: utils
          Priority: optional
          Architecture: amd64
          Maintainer: ZcAgentBeacon
          Description: LAN dashboard for Codex conversation status
          EOF
          dpkg-deb --build deb dist/ZcAgentBeacon-linux-x64.deb
      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: |
            dist/ZcAgentBeacon-linux-x64.tar.gz
            dist/ZcAgentBeacon-linux-x64.deb

  raspberry-pi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: dart pub get
      - name: Build source fallback package
        run: |
          set -eux
          mkdir -p dist/pi-source/dashboard
          (cd apps/dashboard && flutter build web --release)
          cp -R apps packages installers/raspberry-pi scripts pubspec.yaml analysis_options.yaml dist/pi-source/
          cp -R apps/dashboard/build/web/. dist/pi-source/dashboard/
          tar -czf dist/ZcAgentBeacon-RaspberryPi-source.tar.gz -C dist/pi-source .
      - uses: actions/upload-artifact@v4
        with:
          name: raspberry-pi
          path: dist/ZcAgentBeacon-RaspberryPi-source.tar.gz

  publish:
    needs: [windows, macos, linux, raspberry-pi]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true
      - name: Checksums
        run: |
          cd release
          sha256sum * > SHA256SUMS
      - name: Release metadata
        id: meta
        env:
          RELEASE_INPUT_TAG: ${{ inputs.tag }}
          RELEASE_INPUT_TITLE: ${{ inputs.title }}
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            tag="${RELEASE_INPUT_TAG}"
            title="${RELEASE_INPUT_TITLE}"
          else
            tag="${GITHUB_REF_NAME}"
            title="${GITHUB_REF_NAME}"
          fi
          if [ -z "$title" ]; then
            title="$tag"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "title=$title" >> "$GITHUB_OUTPUT"
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.title }}
          target_commitish: ${{ github.sha }}
          files: release/*
          generate_release_notes: true
