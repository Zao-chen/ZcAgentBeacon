name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Analyze and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Resolve workspace
        run: dart pub get
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: 3.12.2
      - name: Toolchain info
        run: |
          git rev-parse HEAD
          dart --version
          flutter --version
      - name: Format
        run: dart format packages apps
      - name: Analyze
        run: flutter analyze
      - name: Core tests
        working-directory: packages/zc_agentbeacon_core
        run: dart test
      - name: Dashboard tests
        working-directory: apps/dashboard
        run: flutter test
      - name: Ensure legacy Python is not in release inputs
        run: |
          test -d legacy
          ! find apps packages installers -name '*.py' | grep .
